<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Error — Templa</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet" />
	<style>
		:root {
			--primary: #9fe870;
			--primary-active: #cdffad;
			--canvas: #ffffff;
			--canvas-soft: #e8ebe6;
			--ink: #0e0f0c;
			--ink-deep: #163300;
			--body: #454745;
			--mute: #868685;
			--negative: #d03238;
			--warning-deep: #b86700;
			--r-sm: 8px;
			--r-md: 12px;
			--r-xl: 24px;
			--font: 'Inter', -apple-system, system-ui, sans-serif;
		}

		*,
		*::before,
		*::after {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		html,
		body {
			height: 100%;
		}

		body {
			font-family: var(--font);
			font-size: 16px;
			line-height: 1.5;
			color: var(--ink);
			background: var(--canvas-soft);
			-webkit-font-smoothing: antialiased;
			display: flex;
			flex-direction: column;
			min-height: 100%;
		}

		a {
			color: inherit;
			text-decoration: none;
		}

		/* Nav */
		.nav {
			background: var(--canvas);
			border-bottom: 1px solid rgba(14, 15, 12, .08);
		}

		.nav-inner {
			max-width: 1200px;
			margin: 0 auto;
			padding: 0 24px;
			height: 64px;
			display: flex;
			align-items: center;
			justify-content: space-between;
		}

		.nav-logo {
			font-size: 20px;
			font-weight: 900;
			letter-spacing: -.03em;
			display: flex;
			align-items: center;
			gap: 6px;
		}

		.nav-logo-badge {
			width: 30px;
			height: 30px;
			background: var(--primary);
			border-radius: var(--r-sm);
			display: grid;
			place-items: center;
			font-size: 15px;
			font-weight: 900;
		}

		.nav-cta {
			background: var(--primary);
			color: var(--ink);
			font-size: 14px;
			font-weight: 600;
			padding: 8px 16px;
			border-radius: var(--r-xl);
			transition: background .15s;
		}

		.nav-cta:hover {
			background: var(--primary-active);
		}

		/* Stage */
		.stage {
			flex: 1;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 64px 24px;
		}

		.error-card {
			background: var(--canvas);
			border-radius: var(--r-xl);
			padding: 56px 48px;
			max-width: 520px;
			width: 100%;
			text-align: center;
		}

		/* Code ring — color set via data-code in JS */
		.error-code-ring {
			width: 88px;
			height: 88px;
			border-radius: 50%;
			background: rgba(208, 50, 56, .08);
			display: grid;
			place-items: center;
			margin: 0 auto 28px;
		}

		.error-code-ring[data-variant="warn"] {
			background: rgba(255, 209, 26, .14);
		}

		.error-code-ring[data-variant="neutral"] {
			background: rgba(14, 15, 12, .06);
		}

		.error-code-number {
			font-size: 32px;
			font-weight: 900;
			letter-spacing: -.03em;
			color: var(--negative);
			line-height: 1;
		}

		.error-code-ring[data-variant="warn"] .error-code-number {
			color: var(--warning-deep);
		}

		.error-code-ring[data-variant="neutral"] .error-code-number {
			color: var(--ink);
		}

		.error-title {
			font-size: 32px;
			font-weight: 900;
			letter-spacing: -.025em;
			color: var(--ink);
			margin-bottom: 12px;
		}

		.error-desc {
			font-size: 16px;
			line-height: 1.65;
			color: var(--body);
			margin-bottom: 36px;
		}

		.error-actions {
			display: flex;
			flex-direction: column;
			gap: 12px;
		}

		.btn-primary {
			background: var(--primary);
			color: var(--ink);
			font-size: 16px;
			font-weight: 600;
			padding: 14px 24px;
			border-radius: var(--r-xl);
			transition: background .15s;
			display: block;
		}

		.btn-primary:hover {
			background: var(--primary-active);
		}

		.btn-ghost {
			background: transparent;
			color: var(--body);
			font-size: 14px;
			font-weight: 600;
			padding: 10px 24px;
			border-radius: var(--r-xl);
			border: 1px solid rgba(14, 15, 12, .16);
			transition: border-color .15s, color .15s;
			display: block;
		}

		.btn-ghost:hover {
			border-color: var(--ink);
			color: var(--ink);
		}

		/* Footer */
		.footer {
			background: var(--ink);
			padding: 32px 24px;
		}

		.footer-inner {
			max-width: 1200px;
			margin: 0 auto;
			display: flex;
			justify-content: space-between;
			align-items: center;
			flex-wrap: wrap;
			gap: 12px;
		}

		.footer-logo {
			font-size: 16px;
			font-weight: 900;
			letter-spacing: -.03em;
			color: var(--canvas-soft);
			display: flex;
			align-items: center;
			gap: 6px;
		}

		.footer-logo-badge {
			width: 24px;
			height: 24px;
			background: var(--primary);
			border-radius: 6px;
			display: grid;
			place-items: center;
			font-size: 12px;
			font-weight: 900;
			color: var(--ink);
		}

		.footer-links {
			display: flex;
			gap: 20px;
		}

		.footer-links a {
			color: rgba(232, 235, 230, .55);
			font-size: 13px;
			transition: color .15s;
		}

		.footer-links a:hover {
			color: var(--canvas-soft);
		}

		@media (max-width: 600px) {
			.error-card {
				padding: 40px 24px;
			}

			.error-title {
				font-size: 26px;
			}

			.footer-inner {
				flex-direction: column;
				align-items: flex-start;
			}
		}
	</style>
</head>

<body>

	<header class="nav">
		<div class="nav-inner">
			<a href="index.html" class="nav-logo">
				<span class="nav-logo-badge">T</span>Templa
			</a>
			<a href="index.html" class="nav-cta">Browse templates</a>
		</div>
	</header>

	<main class="stage">
		<div class="error-card">
			<div class="error-code-ring" id="err-ring">
				<span class="error-code-number" id="err-code">500</span>
			</div>
			<h1 class="error-title" id="err-title">Something went wrong</h1>
			<p class="error-desc" id="err-desc">
				An unexpected error occurred on our end. Try refreshing, or come back in a few minutes.
			</p>
			<div class="error-actions" id="err-actions">
				<a href="javascript:location.reload()" class="btn-primary">Try again</a>
				<a href="index.html" class="btn-ghost">Back to home</a>
			</div>
		</div>
	</main>

	<footer class="footer">
		<div class="footer-inner">
			<a href="index.html" class="footer-logo">
				<span class="footer-logo-badge">T</span>Templa
			</a>
			<nav class="footer-links" aria-label="Footer">
				<a href="template-detail.html">Templates</a>
				<a href="order-status.html">Order status</a>
				<a href="contact.html">Support</a>
			</nav>
		</div>
	</footer>

	<script>
		(function () {
			var params = new URLSearchParams(location.search);
			var code = parseInt(params.get('code') || '500', 10);
			if (isNaN(code)) code = 500;

			var ERRORS = {
				400: { variant: 'error', title: 'Bad request', desc: 'The request was malformed or missing required information. Check the URL and try again.', actions: [{ label: 'Go back', href: 'javascript:history.back()', primary: true }, { label: 'Back to home', href: 'index.html' }] },
				401: { variant: 'error', title: 'Sign in required', desc: 'You need to sign in to access this page.', actions: [{ label: 'Sign in', href: 'contact.html', primary: true }, { label: 'Back to home', href: 'index.html' }] },
				403: { variant: 'warn', title: 'Access denied', desc: "You don't have permission to view this page. If you think this is a mistake, contact support.", actions: [{ label: 'Contact support', href: 'contact.html', primary: true }, { label: 'Back to home', href: 'index.html' }] },
				404: { variant: 'neutral', title: 'Page not found', desc: "The page you're looking for doesn't exist or may have been moved. Check the URL or browse our templates.", actions: [{ label: 'Browse templates', href: 'template-detail.html', primary: true }, { label: 'Back to home', href: 'index.html' }] },
				408: { variant: 'warn', title: 'Request timed out', desc: 'The server took too long to respond. Check your connection and try again.', actions: [{ label: 'Try again', href: 'javascript:location.reload()', primary: true }, { label: 'Back to home', href: 'index.html' }] },
				429: { variant: 'warn', title: 'Too many requests', desc: "You've made too many requests in a short period. Wait a moment, then try again.", actions: [{ label: 'Try again', href: 'javascript:location.reload()', primary: true }, { label: 'Back to home', href: 'index.html' }] },
				500: { variant: 'error', title: 'Something went wrong', desc: 'An unexpected error occurred on our end. Try refreshing the page, or come back in a few minutes.', actions: [{ label: 'Try again', href: 'javascript:location.reload()', primary: true }, { label: 'Back to home', href: 'index.html' }] },
				502: { variant: 'error', title: 'Bad gateway', desc: "We're having trouble connecting to our servers. This is usually temporary — please try again shortly.", actions: [{ label: 'Try again', href: 'javascript:location.reload()', primary: true }, { label: 'Contact support', href: 'contact.html' }] },
				503: { variant: 'warn', title: 'Service unavailable', desc: "Templa is temporarily down for maintenance. We'll be back shortly.", actions: [{ label: 'Try again', href: 'javascript:location.reload()', primary: true }, { label: 'Contact support', href: 'contact.html' }] },
				504: { variant: 'error', title: 'Gateway timeout', desc: "The server didn't respond in time. Check your connection and try again.", actions: [{ label: 'Try again', href: 'javascript:location.reload()', primary: true }, { label: 'Back to home', href: 'index.html' }] }
			};

			var info = ERRORS[code] || ERRORS[500];
			var VARIANT_MAP = { 'warn': 'warn', 'neutral': 'neutral', 'error': '' };

			document.getElementById('err-code').textContent = String(code);
			document.getElementById('err-title').textContent = info.title;
			document.getElementById('err-desc').textContent = info.desc;

			var ring = document.getElementById('err-ring');
			if (info.variant && info.variant !== 'error') ring.dataset.variant = info.variant;

			var acts = document.getElementById('err-actions');
			acts.innerHTML = info.actions.map(function (a) {
				return '<a href="' + a.href + '" class="' + (a.primary ? 'btn-primary' : 'btn-ghost') + '">' + a.label + '</a>';
			}).join('');
		})();
	</script>

</body>

</html>
